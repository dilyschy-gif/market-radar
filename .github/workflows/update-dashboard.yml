name: Update Market Radar Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # Taiwan time: 08:37, 12:37, 15:17, 20:07, 21:17
    # FinMind 法人與融資券約在 20:00/21:00 更新，21:17 才重算 IC 籌碼分數。
    - cron: "37 0 * * *"
    - cron: "37 4 * * *"
    - cron: "17 7 * * *"
    - cron: "7 12 * * *"
    - cron: "17 13 * * *"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Restore previous FinMind snapshot
        run: |
          mkdir -p site/data
          git fetch origin gh-pages --depth=1 || true
          if git show origin/gh-pages:data/ic-chip.json > /tmp/ic-chip.json; then
            mv /tmp/ic-chip.json site/data/ic-chip.json
          else
            rm -f /tmp/ic-chip.json
          fi

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate Pro dashboard
        env:
          FINMIND_API_TOKEN: ${{ secrets.FINMIND_API_TOKEN }}
        run: python market_radar_pro.py

      - name: Add nojekyll marker
        run: touch site/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true
          commit_message: "Update market radar Pro dashboard"
