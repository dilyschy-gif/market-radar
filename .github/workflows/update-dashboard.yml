name: Update Market Radar Dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    # Taiwan time: 08:37, 12:37, 15:17, 20:07
    - cron: "37 0 * * *"
    - cron: "37 4 * * *"
    - cron: "17 7 * * *"
    - cron: "7 12 * * *"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate Pro dashboard
        run: python market_radar_pro.py

      - name: Add nojekyll marker
        run: touch site/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true
          commit_message: "Update market radar Pro dashboard"
